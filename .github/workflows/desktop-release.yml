name: Desktop Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  windows-desktop:
    name: Build And Publish Windows Desktop Artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Provision portable runtimes and app prerequisites
        shell: cmd
        run: start_on_windows.bat

      - name: Stop launcher-started services before packaging
        shell: powershell
        run: |
          $ports = @(8000, 8001)
          foreach ($port in $ports) {
            $connections = Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction SilentlyContinue
            foreach ($connection in $connections) {
              Stop-Process -Id $connection.OwningProcess -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Build desktop package
        shell: cmd
        run: release\tauri\build_with_tauri.bat

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xreport-windows-desktop
          path: release/windows/**
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/windows/**/*
